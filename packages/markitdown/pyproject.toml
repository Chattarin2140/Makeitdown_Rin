[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "markitdown"
version = "0.0.0"
description = "Local editable package scaffold for Makeitdown_Rin"
requires-python = ">=3.12"

[project.scripts]
markitdown = "markitdown.cli:main"

[project.optional-dependencies]
all = []

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]